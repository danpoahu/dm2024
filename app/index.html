<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#2E7D32">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Discover More - Anchor Church</title>
  <link rel="manifest" href="/app/manifest.json">
  <link rel="icon" href="/Icon_Android.jpg">
  <link rel="apple-touch-icon" href="/Icon_Android.jpg">
  <link rel="stylesheet" href="/app/css/style.css?v=26">
  <link rel="stylesheet" href="/app/css/chat.css?v=2">
</head>
<body>
  <div id="app"></div>
  <div style="position:fixed;top:4px;right:6px;font-size:9px;color:rgba(0,0,0,0.15);z-index:9999;pointer-events:none;">v26</div>
  <script src="/app/js/jspdf.min.js"></script>
  <script>
    // Unregister any old service workers and clear their caches
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => {
        regs.forEach(r => r.unregister());
      });
      caches.keys().then(keys => {
        keys.forEach(k => caches.delete(k));
      });
    }
  </script>
  <script type="module" src="/app/js/app.js?v=26"></script>
  <script type="module">
    import { initChat } from '/app/js/chat.js?v=2';
    initChat();
  </script>
</body>
</html>
